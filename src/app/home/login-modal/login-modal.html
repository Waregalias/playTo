<div
  class="fixed inset-0 bg-ink/50 flex items-center justify-center z-50 p-4 animate-modal-in font-bricolage"
  (click)="onBackdropClick($event)"
>
  <div class="bg-white rounded-2xl p-8 w-full max-w-sm shadow-2xl relative animate-modal-card">

    <button
      data-testid="close-btn"
      (click)="close()"
      class="absolute top-4 right-4 text-mist hover:text-ink text-2xl leading-none transition-colors"
    >
      ×
    </button>

    <h2 class="text-2xl font-bold tracking-tight text-center text-ink mb-2">
      Cozy Kingdom
    </h2>
    <p class="text-center text-mist text-sm mb-6">
      Entrez votre jeton pour accéder à votre compte
    </p>

    <input
      type="text"
      data-testid="token-input"
      [value]="token()"
      (input)="token.set($any($event.target).value)"
      placeholder="Jeton de connexion"
      class="w-full border border-gray-200 rounded-lg px-4 py-3 bg-gray-50 text-sm focus:outline-none focus:border-sky-deep transition-colors"
    />

    <button
      data-testid="submit-btn"
      (click)="submit()"
      [disabled]="!token()"
      class="w-full mt-4 bg-sky-deep text-white text-sm font-semibold tracking-wide py-3 rounded-lg hover:bg-ink disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
    >
      Entrer dans le royaume
    </button>

  </div>
</div>
