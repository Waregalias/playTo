<div
  class="fixed inset-0 bg-ink/50 flex items-center justify-center z-50 p-4 animate-modal-in font-bricolage"
  (click)="onBackdropClick($event)"
>
  <div class="bg-white rounded-2xl p-8 w-full max-w-sm shadow-2xl relative animate-modal-card">

    <button
      data-testid="close-btn"
      (click)="close()"
      class="absolute top-4 right-4 text-mist hover:text-ink text-2xl leading-none transition-colors"
    >
      ×
    </button>

    <h2 class="text-2xl font-bold tracking-tight text-center text-ink mb-2">
      {{ t.title }}
    </h2>
    <p class="text-center text-mist text-sm mb-6">
      {{ mode() === 'sign-in' ? t.signInIntro : t.signUpIntro }}
    </p>

    <form (submit)="$event.preventDefault(); submit()">
      <input
        type="email"
        data-testid="email-input"
        [value]="email()"
        (input)="email.set($any($event.target).value)"
        [placeholder]="t.emailLabel"
        autocomplete="email"
        class="w-full border border-gray-200 rounded-lg px-4 py-3 bg-gray-50 text-sm focus:outline-none focus:border-sky-deep transition-colors"
      />

      <input
        type="password"
        data-testid="password-input"
        [value]="password()"
        (input)="password.set($any($event.target).value)"
        [placeholder]="t.passwordLabel"
        [autocomplete]="mode() === 'sign-in' ? 'current-password' : 'new-password'"
        class="w-full mt-3 border border-gray-200 rounded-lg px-4 py-3 bg-gray-50 text-sm focus:outline-none focus:border-sky-deep transition-colors"
      />

      @if (error(); as message) {
        <p data-testid="auth-error" class="mt-3 text-sm text-red-700">{{ message }}</p>
      }

      <button
        type="submit"
        data-testid="submit-btn"
        [disabled]="!canSubmit()"
        class="w-full mt-4 bg-sky-deep text-white text-sm font-semibold tracking-wide py-3 rounded-lg hover:bg-ink disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
      >
        {{ mode() === 'sign-in' ? t.signInAction : t.signUpAction }}
      </button>
    </form>

    <button
      data-testid="toggle-mode-btn"
      (click)="toggleMode()"
      class="w-full mt-4 text-xs text-mist hover:text-ink transition-colors"
    >
      {{ mode() === 'sign-in' ? t.toggleToSignUp : t.toggleToSignIn }}
    </button>

  </div>
</div>
