<span class="eyebrow">{{ regionName() }} · {{ t.mistLevelLabel }} {{ regionMist() }}</span>
<h2>{{ regionName() }}</h2>

<div class="mapwrap">
  <svg
    [attr.viewBox]="viewBox()"
    role="img"
    [attr.aria-label]="'Carte — ' + regionName()"
  >
    <!-- terrain -->
    @for (view of hexViews(); track view.hex.id) {
      <polygon
        class="hex"
        [class.sel]="view.hex.id === selectedId()"
        [attr.points]="view.points"
        [attr.fill]="view.fill"
        (click)="select(view.hex.id)"
        [attr.data-testid]="'hex-' + view.hex.q + '-' + view.hex.r"
      />
    }
    <!-- mist drift over fog hexes -->
    @for (view of hexViews(); track view.hex.id) {
      @if (!view.hex.discovered) {
        <ellipse class="mist-drift" [attr.cx]="view.x" [attr.cy]="view.y - 4" rx="16" ry="6" fill="#7E93A6" />
        <ellipse class="mist-drift slow" [attr.cx]="view.x - 5" [attr.cy]="view.y + 6" rx="13" ry="5" fill="#5A6B7A" />
      }
    }
    <!-- POI / shrine glyphs -->
    @for (view of hexViews(); track view.hex.id) {
      @if (view.hex.discovered && view.hex.poi) {
        <text class="hexlabel" [attr.x]="view.x" [attr.y]="view.y + 3">
          {{ view.hex.terrain === 'shrine' ? '⌂' : '✦' }}
        </text>
      }
    }
    <!-- player marker -->
    @if (playerView(); as player) {
      <circle [attr.cx]="player.x" [attr.cy]="player.y" r="7" fill="#FFC46B" stroke="#1A0E02" stroke-width="2" />
      <circle class="pulse" [attr.cx]="player.x" [attr.cy]="player.y" r="11" fill="none" stroke="#FFC46B" stroke-width="1" opacity="0.5" />
    }
  </svg>
</div>

<div class="card panel" data-testid="hex-panel">
  <h3>{{ panel().title }}</h3>
  <p class="muted">{{ panel().hint }}</p>

  @if (panel().canMove) {
    <div class="costs">
      <span>⚡ <b>{{ panel().costLabel }}</b> {{ t.staminaCost }}</span>
      <span>⏳ <b>{{ panel().timeLabel }}</b></span>
    </div>
    <button class="btn primary" data-testid="move-btn" [disabled]="pending()" (click)="move()">
      {{ t.moveAction }}
    </button>
  }
  @if (panel().canRest) {
    <button class="btn primary" data-testid="rest-btn" [disabled]="pending()" (click)="rest()">
      {{ t.restAction }}
    </button>
  }
  @if (panel().canSearch) {
    <button class="btn primary" data-testid="search-btn" [disabled]="pending()" (click)="search()">
      {{ tExtra.searchAction }}
    </button>
  }
</div>
