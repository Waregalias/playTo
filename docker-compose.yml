services:
  db:
    image: postgres:16-alpine
    container_name: aldenfer-db
    environment:
      POSTGRES_USER: aldenfer
      POSTGRES_PASSWORD: aldenfer
      POSTGRES_DB: aldenfer
    ports:
      - '5432:5432'
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aldenfer']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  dbdata:
